# Fails: two resources share uid_ref "dup-1".
version: "1"
name: invalid-duplicate-uid-ref

gateways:
  - uid_ref: gw
    name: "Some Gateway"
    mode: reference_existing

pam_configurations:
  - uid_ref: cfg
    environment: local
    title: "cfg"
    gateway_uid_ref: gw

resources:
  - uid_ref: dup-1
    type: pamMachine
    title: "host-a"
    pam_configuration_uid_ref: cfg
    shared_folder: resources
    host: 10.0.0.1
    operating_system: Linux
    pam_settings:
      connection: { protocol: ssh }
  - uid_ref: dup-1    # duplicate
    type: pamMachine
    title: "host-b"
    pam_configuration_uid_ref: cfg
    shared_folder: resources
    host: 10.0.0.2
    operating_system: Linux
    pam_settings:
      connection: { protocol: ssh }
