name: Codex task
description: Scoped task packet for Codex cloud or Codex GitHub Action workers.
title: "codex: "
labels: ["codex-task"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: One concrete change or investigation. Avoid bundling unrelated work.
      placeholder: "Implement the offline ref-resolution test for ..."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files or directories Codex may touch. Say "read-only" if no edits are allowed.
      placeholder: |
        Allowed:
        - keeper_sdk/providers/commander_cli.py
        - tests/test_commander_cli.py
    validations:
      required: true
  - type: textarea
    id: success_criteria
    attributes:
      label: Success Criteria
      description: Observable checks that make the task done.
      placeholder: |
        - Exact type+title matching remains primary.
        - Duplicate title fallback raises.
        - python3 -m pytest -q tests/test_commander_cli.py passes.
    validations:
      required: true
  - type: textarea
    id: allowed_commands
    attributes:
      label: Allowed Commands
      description: Commands Codex may run. Do not include live Keeper commands unless explicitly intended.
      placeholder: |
        python3 -m pytest -q tests/test_commander_cli.py
    validations:
      required: true
  - type: dropdown
    id: live_access
    attributes:
      label: Live Access
      description: Whether this task may touch a live Keeper tenant.
      options:
        - "No live access"
        - "One whitelisted smoke command only"
        - "Read-only tenant inspection only"
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Required Done Report
      value: |
        DONE
        CHG: <files changed>
        tests: <exact commands and PASS/FAIL>
        risks: <remaining risk, live-proof need, or "none">
        TOKEN: clean | finding=<one-line>
    validations:
      required: true
