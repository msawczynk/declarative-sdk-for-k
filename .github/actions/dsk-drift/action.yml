name: dsk-drift
description: Run scheduled dsk plan drift detection and open or update a GitHub issue.

inputs:
  manifest_path:
    description: Path to the declarative manifest to check for live drift.
    required: true
  issue_label:
    description: Label applied to drift issues.
    required: false
    default: dsk-drift
  assignees:
    description: Comma-separated GitHub logins assigned to drift issues.
    required: false
    default: ""

outputs:
  drift_found:
    description: "true when dsk plan exits 2 or reports create/update/delete rows."
    value: ${{ steps.plan.outputs.drift_found }}
  conflict_count:
    description: Number of plan conflict rows.
    value: ${{ steps.plan.outputs.conflict_count }}
  change_count:
    description: Number of create, update, delete, and conflict rows.
    value: ${{ steps.plan.outputs.change_count }}
  issue_number:
    description: Existing or created drift issue number.
    value: ${{ steps.issue.outputs.issue_number }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dsk
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        if [ -f pyproject.toml ] && grep -q 'name = "declarative-sdk-for-k"' pyproject.toml; then
          python -m pip install -e ".[ksm]"
        else
          python -m pip install "declarative-sdk-for-k[ksm] @ git+https://github.com/msawczynk/declarative-sdk-for-k.git@main"
        fi

    - name: Materialize KSM config secret
      shell: bash
      run: |
        set -euo pipefail
        for env_name in KEEPER_SDK_KSM_CONFIG KSM_CONFIG; do
          env_value="${!env_name-}"
          [ -n "$env_value" ] || continue
          first_char="$(printf '%s' "$env_value" | sed -n 's/^[[:space:]]*//;s/^\(.\).*$/\1/p' | head -n 1)"
          if [ "$first_char" = "{" ]; then
            cfg="$RUNNER_TEMP/dsk-ksm-config.json"
            umask 077
            printf '%s' "$env_value" > "$cfg"
            {
              echo "KEEPER_SDK_KSM_CONFIG=$cfg"
              echo "KSM_CONFIG=$cfg"
            } >> "$GITHUB_ENV"
            break
          fi
        done

    - name: Run dsk plan
      id: plan
      shell: bash
      env:
        INPUT_MANIFEST_PATH: ${{ inputs.manifest_path }}
      run: |
        set -euo pipefail
        provider="${DSK_PROVIDER:-commander}"
        case "$provider" in
          mock|service|commander) ;;
          *)
            echo "::error::DSK_PROVIDER must be one of: mock, service, commander"
            exit 1
            ;;
        esac

        plan_json="$RUNNER_TEMP/dsk-drift-plan.json"
        plan_stderr="$RUNNER_TEMP/dsk-drift-plan.stderr"
        set +e
        dsk plan "$INPUT_MANIFEST_PATH" --json --provider "$provider" > "$plan_json" 2> "$plan_stderr"
        plan_exit=$?
        set -e

        if ! jq empty "$plan_json" >/dev/null 2>&1; then
          echo "::error::dsk plan did not emit JSON (exit $plan_exit)"
          sed -n '1,120p' "$plan_stderr"
          exit "$plan_exit"
        fi

        create_count="$(jq -r '.summary.create // 0' "$plan_json")"
        update_count="$(jq -r '.summary.update // 0' "$plan_json")"
        delete_count="$(jq -r '.summary.delete // 0' "$plan_json")"
        conflict_count="$(jq -r '.summary.conflict // 0' "$plan_json")"
        drift_count=$((create_count + update_count + delete_count))
        change_count=$((drift_count + conflict_count))
        if [ "$plan_exit" -eq 2 ] || [ "$drift_count" -gt 0 ]; then
          drift_found=true
        else
          drift_found=false
        fi

        plan_md="$RUNNER_TEMP/dsk-drift.md"
        marker="<!-- dsk-drift:$INPUT_MANIFEST_PATH -->"
        {
          echo "$marker"
          echo "### dsk drift detected"
          echo
          echo "| manifest | provider | create | update | delete | conflicts |"
          echo "|---|---:|---:|---:|---:|---:|"
          echo "| \`$INPUT_MANIFEST_PATH\` | \`$provider\` | $create_count | $update_count | $delete_count | $conflict_count |"
          echo
          echo "| kind | uid_ref | resource_type | title | keeper_uid | reason |"
          echo "|---|---|---|---|---|---|"
          jq -r '
            def cell:
              if . == null or . == "" then "-"
              else tostring | gsub("\\|"; "\\|") | gsub("\r?\n"; " ")
              end;
            (.changes // []) as $changes
            | if ($changes | length) == 0 then
                "| noop | - | - | - | - | - |"
              else
                $changes[]
                | "| \(.kind | cell) | \(.uid_ref | cell) | \(.resource_type | cell) | \(.title | cell) | \(.keeper_uid | cell) | \(.reason | cell) |"
              end
          ' "$plan_json"
        } > "$plan_md"

        {
          echo "drift_found=$drift_found"
          echo "conflict_count=$conflict_count"
          echo "change_count=$change_count"
          echo "plan_exit=$plan_exit"
          echo "plan_markdown=$plan_md"
          echo "provider=$provider"
        } >> "$GITHUB_OUTPUT"

        if [ "$plan_exit" -ne 0 ] && [ "$plan_exit" -ne 2 ] && [ "$plan_exit" -ne 4 ]; then
          echo "::error::dsk plan failed with exit $plan_exit"
          sed -n '1,120p' "$plan_stderr"
          exit "$plan_exit"
        fi

    - name: Open or update drift issue
      id: issue
      if: ${{ steps.plan.outputs.drift_found == 'true' || steps.plan.outputs.conflict_count != '0' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_MANIFEST_PATH: ${{ inputs.manifest_path }}
        INPUT_ISSUE_LABEL: ${{ inputs.issue_label }}
        INPUT_ASSIGNEES: ${{ inputs.assignees }}
        PLAN_MARKDOWN: ${{ steps.plan.outputs.plan_markdown }}
        PLAN_PROVIDER: ${{ steps.plan.outputs.provider }}
      run: |
        set -euo pipefail
        marker="<!-- dsk-drift:$INPUT_MANIFEST_PATH -->"
        title="dsk drift detected: $INPUT_MANIFEST_PATH"
        labels_json="$(jq -cn --arg s "$INPUT_ISSUE_LABEL" '$s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"
        assignees_json="$(jq -cn --arg s "$INPUT_ASSIGNEES" '$s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"

        issues_json="$RUNNER_TEMP/dsk-drift-issues.json"
        gh api "repos/$GITHUB_REPOSITORY/issues?state=open&per_page=100" > "$issues_json"
        issue_number="$(jq -r --arg marker "$marker" '.[] | select(.pull_request | not) | select(.body | contains($marker)) | .number' "$issues_json" | tail -n 1)"

        payload="$RUNNER_TEMP/dsk-drift-issue-payload.json"
        jq -n \
          --arg title "$title" \
          --rawfile body "$PLAN_MARKDOWN" \
          --argjson labels "$labels_json" \
          --argjson assignees "$assignees_json" \
          '{title: $title, body: $body, labels: $labels, assignees: $assignees}' > "$payload"

        if [ -n "$issue_number" ] && [ "$issue_number" != "null" ]; then
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/$issue_number" --input "$payload" >/dev/null
        else
          created_json="$RUNNER_TEMP/dsk-drift-created.json"
          gh api -X POST "repos/$GITHUB_REPOSITORY/issues" --input "$payload" > "$created_json"
          issue_number="$(jq -r '.number' "$created_json")"
        fi

        echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

    - name: Fail on conflicts
      if: ${{ steps.plan.outputs.conflict_count != '0' }}
      shell: bash
      run: |
        echo "::error::dsk drift plan has ${{ steps.plan.outputs.conflict_count }} conflict(s)"
        exit 4
