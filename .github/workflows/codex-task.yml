name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: "One concrete Codex task"
        required: true
        type: string
      scope:
        description: "Allowed files/directories; say read-only if no edits"
        required: true
        type: string
      success_criteria:
        description: "Observable acceptance criteria"
        required: true
        type: string
      allowed_commands:
        description: "Commands Codex may run"
        required: true
        type: string
      live_access:
        description: "Live access policy"
        required: true
        default: "No live access"
        type: choice
        options:
          - "No live access"
          - "One whitelisted smoke command only"
          - "Read-only tenant inspection only"
      model:
        description: "Codex model"
        required: true
        default: "gpt-5.5"
        type: string

permissions:
  contents: read

concurrency:
  group: codex-task-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  codex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Codex task
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ inputs.model }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: codex-output.md
          prompt: |
            You are working on msawczynk/declarative-sdk-for-k.

            Task:
            ${{ inputs.task }}

            Scope:
            ${{ inputs.scope }}

            Success criteria:
            ${{ inputs.success_criteria }}

            Allowed commands:
            ${{ inputs.allowed_commands }}

            Live access:
            ${{ inputs.live_access }}

            Rules:
            - Treat scope as a hard boundary.
            - Run only allowed commands.
            - If live access is "No live access", do not run Keeper tenant commands, inspect credential files, print env vars, or access live config contents.
            - Preserve preview/provider gates. Do not turn preview work into a support claim without parent-reviewed live proof.
            - Do not print secrets, env values, config JSON, TOTP seeds, passwords, or raw secret-bearing logs.
            - Do not echo full file contents or full diffs unless the final report needs a short cited snippet.

            Return:
            DONE
            CHG: <files changed>
            tests: <exact commands and PASS/FAIL>
            risks: <remaining risk, live-proof need, or "none">
            TOKEN: clean | finding=<one-line>

      - name: Capture patch
        if: always()
        run: git diff --binary > codex.patch

      - name: Upload Codex artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-task-${{ github.run_id }}
          path: |
            codex-output.md
            codex.patch
